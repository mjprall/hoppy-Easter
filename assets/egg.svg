<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <clipPath id="eggClip">
      <ellipse cx="50" cy="72" rx="42" ry="56"/>
    </clipPath>
  </defs>
  <!-- Base egg body -->
  <ellipse cx="50" cy="72" rx="42" ry="56" fill="#FFD966"/>
  <!-- Stripe band 1 -->
  <rect x="0" y="52" width="100" height="18" fill="#FF6B9D" clip-path="url(#eggClip)"/>
  <!-- Stripe band 2 -->
  <rect x="0" y="88" width="100" height="18" fill="#74C7EC" clip-path="url(#eggClip)"/>
  <!-- Zigzag decoration on first band -->
  <polyline points="0,52 10,62 20,52 30,62 40,52 50,62 60,52 70,62 80,52 90,62 100,52"
            fill="none" stroke="#fff" stroke-width="2.5" clip-path="url(#eggClip)"/>
  <polyline points="0,70 10,60 20,70 30,60 40,70 50,60 60,70 70,60 80,70 90,60 100,70"
            fill="none" stroke="#fff" stroke-width="2.5" clip-path="url(#eggClip)"/>
  <!-- Dots on upper section -->
  <circle cx="28" cy="36" r="6" fill="#A29BFE" clip-path="url(#eggClip)"/>
  <circle cx="50" cy="28" r="5" fill="#FD79A8" clip-path="url(#eggClip)"/>
  <circle cx="72" cy="36" r="6" fill="#55EFC4" clip-path="url(#eggClip)"/>
  <!-- Dots on lower section -->
  <circle cx="30" cy="108" r="5" fill="#FD79A8" clip-path="url(#eggClip)"/>
  <circle cx="50" cy="115" r="6" fill="#A29BFE" clip-path="url(#eggClip)"/>
  <circle cx="70" cy="108" r="5" fill="#55EFC4" clip-path="url(#eggClip)"/>
  <!-- Outline -->
  <ellipse cx="50" cy="72" rx="42" ry="56" fill="none" stroke="#C8A000" stroke-width="2"/>
</svg>
